# ============================================================
# QRowg — CI
# Garde-fou d'imports + typecheck + tests unitaires a chaque push.
# Le DEPLOIEMENT est gere automatiquement par Vercel (integration GitHub),
# donc pas de job de deploy ici (evite la redondance + les secrets inutiles).
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 🔍 Guard, Types & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Garde-fou imports (JSX / lucide)
        run: pnpm check:imports

      - name: Type check
        run: pnpm type-check

      - name: Tests unitaires
        run: pnpm test
